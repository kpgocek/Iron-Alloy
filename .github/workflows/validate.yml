name: validation

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

defaults:
  run:
    shell: bash

jobs:
  validate:
    concurrency:
      group: validate-${{ github.ref }}
      cancel-in-progress: true

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      ############################################
      # FILE REQUIREMENTS
      ############################################

      - name: Check required root files
        run: |
          set -euo pipefail
          for file in theme.css manifest.json LICENSE README.md; do
            [[ -f "$file" ]] || { echo "$file missing"; exit 1; }
          done

      ############################################
      # MANIFEST VALIDATION
      ############################################
      - name: Validate manifest syntax
        id: manifest_syntax
        continue-on-error: true
        run: npm run validate:manifest:syntax

      - name: Validate manifest required fields
        id: manifest_fields
        continue-on-error: true
        run: npm run validate:manifest

      ############################################
      # VERSION CONSISTENCY
      ############################################

      - name: Validate release tag matches manifest version
        id: version
        continue-on-error: true
        if: github.event_name == 'release'
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          TAG=${GITHUB_REF#refs/tags/}

          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag ($TAG) does not match manifest version ($VERSION)"
            exit 1
          fi

      ############################################
      # CSS QUALITY CHECKS
      ############################################
      - name: Lint CSS syntax
        id: css_lint
        continue-on-error: true
        run: |
          echo '{ "extends": "stylelint-config-standard" }' > .stylelintrc.json
          npm run lint:css

      - name: Check for forbidden patterns
        id: css_patterns
        continue-on-error: true
        run: |
          set -euo pipefail

          check() {
            local pattern="$1"
            local message="$2"

            if grep -iE "$pattern" theme.css; then
              echo "$message"
              exit 1
            fi
          }

          # Block remote imports
          check "@import.*http" "Remote @import detected"

          # Block tracking-related keywords
          check "analytics|telemetry|tracking|google-analytics" "Tracking code detected"

          # Block eval (always suspicious in CSS context)
          check "eval\(" "Potential JS eval detected"

          # Handle base64 more carefully
          if grep -iE "base64," theme.css | grep -viE "data:font/woff2|data:font/woff|data:application/octet-stream"; then
            echo "Suspicious base64 usage detected (non-font)"
            exit 1
          fi

      - name: Ensure CSS is not minified
        id: css_size
        continue-on-error: true
        run: |
          LINE_COUNT=$(wc -l < theme.css)
          if [ "$LINE_COUNT" -lt 50 ]; then
            echo "CSS appears minified or too small"
            exit 1
          fi

      ############################################
      # README CHECKS
      ############################################

      - name: Validate README structure
        id: readme
        continue-on-error: true
        run: |
          ERRORS_COUNT=0

          if ! grep -iq "install" README.md; then
            echo "README missing installation instructions"
            ERRORS_COUNT=$((ERRORS_COUNT + 1))
          fi

          if ! grep -iq "screenshot" README.md; then
            echo "README missing screenshots reference"
            ERRORS_COUNT=$((ERRORS_COUNT + 1))
          fi

          if ! grep -iq "description" README.md; then
            echo "README missing clear description"
            ERRORS_COUNT=$((ERRORS_COUNT + 1))
          fi

          if [ "$ERRORS_COUNT" -gt 0 ]; then
            exit 1
          fi

      ############################################
      # LICENSE CHECK
      ############################################

      - name: Validate LICENSE content
        id: license
        continue-on-error: true
        run: |
          if ! grep -iqE "MIT|GPL|Apache|BSD" LICENSE; then
            echo "License type not clearly specified"
            exit 1
          fi

      - name: Summarize validation results
        if: always()
        run: |
          FAILURES=0

          check() {
            local name="$1"
            local outcome="$2"

            if [ "$outcome" = "failure" ]; then
              echo "❌ $name"
              FAILURES=$((FAILURES + 1))
            else
              echo "✅ $name"
            fi
          }

          check "Manifest syntax" "${{ steps.manifest_syntax.outcome }}"
          check "Manifest fields" "${{ steps.manifest_fields.outcome }}"
          check "Version consistency" "${{ steps.version.outcome }}"
          check "CSS lint" "${{ steps.css_lint.outcome }}"
          check "Forbidden patterns" "${{ steps.css_patterns.outcome }}"
          check "CSS size" "${{ steps.css_size.outcome }}"
          check "README" "${{ steps.readme.outcome }}"
          check "LICENSE" "${{ steps.license.outcome }}"

          echo ""

          if [ "$FAILURES" -gt 0 ]; then
            echo "🚨 Validation failed with $FAILURES issue(s)"
            exit 1
          else
            echo "✅ All validations passed"
          fi
